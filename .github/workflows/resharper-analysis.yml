name: ReSharper Code Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspect-code:
    name: ReSharper InspectCode
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Setup .NET environment
      uses: ./.github/actions/dotnet-setup

    - name: ReSharper CLI InspectCode
      uses: muno92/resharper_inspectcode@9dd06702fe04cae50fe448156b398c9912d3421b # 1.17.1
      with:
        solutionPath: ./Rivulet.slnx
        version: 2025.3.3
        failOnIssue: '1'
        noBuild: true
        solutionWideAnalysis: true
        minimumReportSeverity: WARNING
        minimumSeverity: warning
        exclude: '**/obj/**;**/bin/**;**/TestResults/**;**/tests/**'
        properties: 'Configuration=Release'
