name: ReSharper Code Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspect-code:
    name: ReSharper InspectCode
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Setup .NET environment
      id: dotnet-setup
      uses: ./.github/actions/dotnet-setup
      # Note: submodules not used — this repo has no git submodules

    - name: ReSharper CLI InspectCode
      uses: muno92/resharper_inspectcode@3a8a8fc8fc48c0ca9eb1c7e69f887a5068bdaba8 # 1.16.0
      with:
        solutionPath: ./Rivulet.slnx
        version: 2025.3.2
        failOnIssue: '1'
        noBuild: true
        solutionWideAnalysis: true
        minimumReportSeverity: WARNING
        minimumSeverity: warning
        dotnetVersion: ${{ steps.dotnet-setup.outputs.dotnet-version }}
        include: '**/**.cs'
        exclude: '**/obj/**;**/bin/**;**/TestResults/**'
        properties: 'Configuration=Release'
