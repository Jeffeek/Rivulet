name: ReSharper Code Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inspect-code:
    name: ReSharper InspectCode
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup .NET environment
      uses: ./.github/actions/dotnet-setup

    - name: ReSharper CLI InspectCode
      uses: muno92/resharper_inspectcode@5e99b0c6b542b5fd3b938d4de201c94a882070b7 # 1.17.0
      with:
        solutionPath: ./Rivulet.slnx
        version: 2025.3.3
        failOnIssue: '1'
        noBuild: true
        solutionWideAnalysis: true
        minimumReportSeverity: WARNING
        minimumSeverity: warning
        exclude: '**/obj/**;**/bin/**;**/TestResults/**;**/tests/**'
        properties: 'Configuration=Release'
