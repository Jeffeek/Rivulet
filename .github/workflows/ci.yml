name: CI - Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "release/**"
  push:
    branches:
      - "master"
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-test:
    name: Quick Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup .NET environment
      uses: ./.github/actions/dotnet-setup

    - name: Run tests for net8.0 and net9.0 (Ubuntu - All tests including integration)
      if: runner.os == 'Linux'
      run: dotnet test Rivulet.slnx -c Release --no-build --verbosity normal
      timeout-minutes: 12

    - name: Run tests for net8.0 and net9.0 (Windows - Unit tests only, integration tests require Linux containers)
      if: runner.os == 'Windows'
      run: dotnet test Rivulet.slnx -c Release --no-build --verbosity normal --filter "Category!=Integration"
      timeout-minutes: 5

  test-with-coverage:
    name: Test with Coverage (Ubuntu)
    runs-on: ubuntu-latest
    needs: quick-test

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup .NET environment
      uses: ./.github/actions/dotnet-setup

    - name: Run tests with coverage
      run: dotnet test Rivulet.slnx -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./coverage
      timeout-minutes: 8

    - name: Upload coverage reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-reports
        path: ./coverage
        retention-days: 7

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ./coverage
        fail_ci_if_error: false
        verbose: true

  codeql-analysis:
    name: CodeQL Security Analysis
    needs: quick-test
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: ./.github/workflows/codeql.yml

  flaky-test-detection:
    name: Flaky Test Detection (PR)
    needs: quick-test
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/reusable-flaky-test-detection.yml
    with:
      iterations: 20
      timeout-minutes: 100
