name: .NET Setup
description: >
  Hardens the runner, checks out the repository, sets up .NET 9,
  caches and restores NuGet packages, and builds the solution in Release mode.
  Used by CI, release, ReSharper, and flaky-test-detection workflows.

inputs:
  fetch-depth:
    description: 'Git fetch depth (0 = full history, 1 = shallow)'
    default: '10'
  submodules:
    description: 'Whether to checkout submodules (false/true/recursive)'
    default: 'false'
  solution-file:
    description: 'Solution file to restore and build'
    default: 'Rivulet.slnx'

outputs:
  dotnet-version:
    description: 'The installed .NET SDK version (e.g. 9.0.301)'
    value: ${{ steps.setup-dotnet.outputs.dotnet-version }}

runs:
  using: composite
  steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: ${{ inputs.submodules }}
        persist-credentials: false

    - name: Setup .NET 9.0.x
      id: setup-dotnet
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 9.0.x

    - name: Cache NuGet packages
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      shell: bash
      run: dotnet restore ${{ inputs.solution-file }}

    - name: Build (Release)
      shell: bash
      run: dotnet build ${{ inputs.solution-file }} -c Release --no-restore
