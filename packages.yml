# Rivulet Package Registry
# This file is the SINGLE SOURCE OF TRUTH for all package information.
# When you add a new package, update this file and run: ./scripts/UpdateAll/update-all.sh (or update-all.ps1 on Windows)
#
# Most fields are AUTO-DERIVED from the codebase:
#   - nuget_id, path, test_path, sample_path, sample_name: derived from 'name'
#   - description, features, key_features: parsed from README.md markers
#   - dependencies: parsed from .csproj (ProjectReference + PackageReference)
#   - targets: global default, validated against .csproj TargetFrameworks
#
# Only specify: name, id, category, version, status.

metadata:
  schema_version: "2.0"
  last_updated: "2026-03-23"
  repository: "https://github.com/Jeffeek/Rivulet"

# Global defaults — all packages MUST share these targets.
# If a .csproj disagrees, validation fails (it's a bug in the .csproj).
defaults:
  targets:
    - net8.0
    - net9.0

packages:
  # ============================================================================
  # CORE PACKAGES
  # ============================================================================

  - name: Rivulet.Core
    id: core
    category: core
    version: 1.0.0
    status: released

  - name: Rivulet.Diagnostics
    id: diagnostics
    category: core
    version: 1.1.0
    status: released

  - name: Rivulet.Diagnostics.OpenTelemetry
    id: diagnostics-otel
    category: core
    version: 1.1.0
    status: released

  - name: Rivulet.Hosting
    id: hosting
    category: core
    version: 1.2.0
    status: released

  - name: Rivulet.Testing
    id: testing
    category: core
    version: 1.2.0
    status: released

  - name: Rivulet.Http
    id: http
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.IO
    id: io
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Sql
    id: sql
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.SqlServer
    id: sql-sqlserver
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.PostgreSql
    id: sql-postgresql
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.MySql
    id: sql-mysql
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Polly
    id: polly
    category: core
    version: 1.3.0
    status: released

  - name: Rivulet.Pipeline
    id: pipeline
    category: core
    version: 2.0.0
    status: in_development

  # ============================================================================
  # INTEGRATION PACKAGES (external library dependencies)
  # ============================================================================

  - name: Rivulet.Csv
    id: csv
    category: integration
    version: 1.4.0
    status: in_development

# ============================================================================
# GENERATION RULES
# ============================================================================

generation:
  targets:
    - type: readme
      output: README.md
    - type: roadmap
      output: ROADMAP.md
    - type: samples_readme
      output: samples/README.md
    - type: mkdocs_nav
      output: mkdocs.yml
    - type: release_workflow
      output: .github/workflows/release.yml
    - type: nuget_monitor
      output: .github/workflows/nuget-activity-monitor.yml
    - type: dependabot
      output: .github/dependabot.yml

  validation:
    check_paths: true
    check_unique_ids: true
    check_dependencies: true
    check_targets: true

# ============================================================================
# CATEGORIZATION
# ============================================================================

categories:
  core:
    display_name: "Core Packages"
    description: "Essential packages providing core functionality"
    badge_color: "blue"

  integration:
    display_name: "Integration Packages"
    description: "Packages integrating with external systems and libraries"
    badge_color: "green"

# ============================================================================
# VERSION ROADMAP
# ============================================================================

versions:
  - version: "1.0.0"
    release_date: "2024-01-15"
    status: released
    packages:
      - core

  - version: "1.1.0"
    release_date: "2024-06-20"
    status: released
    packages:
      - diagnostics
      - diagnostics-otel

  - version: "1.2.0"
    release_date: "2024-11-10"
    status: released
    packages:
      - hosting
      - testing

  - version: "1.3.0"
    release_date: "2025-12-08"
    status: released
    packages:
      - http
      - io
      - sql
      - sql-sqlserver
      - sql-postgresql
      - sql-mysql
      - polly

  - version: "1.4.0"
    release_date: "2025-12-30"
    status: in_development
    packages:
      - csv
      - pipeline

  - version: "1.5.0"
    release_date: "2026-06-15"
    status: planned
    packages:
      - grpc
      - messaging
      - caching

  - version: "1.6.0"
    release_date: "2026-09-15"
    status: planned
    packages:
      - azure
      - aws

  - version: "2.0.0"
    release_date: "2027-01-15"
    status: planned
    packages:
      - core-v2

# ============================================================================
# BADGES AND LINKS
# ============================================================================

badges:
  nuget_url: "https://www.nuget.org/packages/{nuget_id}"
  nuget_badge: "https://img.shields.io/nuget/v/{nuget_id}.svg?style=flat-square"
  nuget_downloads: "https://img.shields.io/nuget/dt/{nuget_id}.svg?style=flat-square"

links:
  documentation: "https://rivulet2.readthedocs.io"
  repository: "https://github.com/Jeffeek/Rivulet"
  issues: "https://github.com/Jeffeek/Rivulet/issues"
  discussions: "https://github.com/Jeffeek/Rivulet/discussions"
