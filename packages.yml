# Rivulet Package Registry
# This file is the SINGLE SOURCE OF TRUTH for all package information.
# When you add a new package, update this file and run: ./scripts/UpdateAll/update-all.sh (or update-all.ps1 on Windows)
#
# Most fields are AUTO-DERIVED from the codebase:
#   - nuget_id, path, test_path, sample_path, sample_name: derived from 'name'
#   - description, features, key_features: parsed from README.md markers
#   - dependencies: parsed from .csproj (ProjectReference + PackageReference)
#   - targets: global default, validated against .csproj TargetFrameworks
#
# Only specify: name, id, version, status.

metadata:
  schema_version: "2.0"
  last_updated: "2026-03-23"
  repository: "https://github.com/Jeffeek/Rivulet"

# Global defaults — all packages MUST share these targets.
# If a .csproj disagrees, validation fails (it's a bug in the .csproj).
defaults:
  targets:
    - net8.0
    - net9.0

packages:
  # ============================================================================
  # RELEASED
  # ============================================================================

  - name: Rivulet.Core
    id: core
    version: 1.0.0
    status: released

  - name: Rivulet.Diagnostics
    id: diagnostics
    version: 1.1.0
    status: released

  - name: Rivulet.Diagnostics.OpenTelemetry
    id: diagnostics-otel
    version: 1.1.0
    status: released

  - name: Rivulet.Hosting
    id: hosting
    version: 1.2.0
    status: released

  - name: Rivulet.Testing
    id: testing
    version: 1.2.0
    status: released

  - name: Rivulet.Http
    id: http
    version: 1.3.0
    status: released

  - name: Rivulet.IO
    id: io
    version: 1.3.0
    status: released

  - name: Rivulet.Sql
    id: sql
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.SqlServer
    id: sql-sqlserver
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.PostgreSql
    id: sql-postgresql
    version: 1.3.0
    status: released

  - name: Rivulet.Sql.MySql
    id: sql-mysql
    version: 1.3.0
    status: released

  - name: Rivulet.Polly
    id: polly
    version: 1.3.0
    status: released

  # ============================================================================
  # IN DEVELOPMENT
  # ============================================================================

  - name: Rivulet.Pipeline
    id: pipeline
    version: 2.0.0
    status: in_development

  - name: Rivulet.Csv
    id: csv
    version: 2.0.0
    status: in_development

# ============================================================================
# VERSION ROADMAP
# ============================================================================

versions:
  - version: "1.0.0"
    release_date: "2024-01-15"
    status: released
    packages:
      - core

  - version: "1.1.0"
    release_date: "2024-06-20"
    status: released
    packages:
      - diagnostics
      - diagnostics-otel

  - version: "1.2.0"
    release_date: "2024-11-10"
    status: released
    packages:
      - hosting
      - testing

  - version: "1.3.0"
    release_date: "2025-12-08"
    status: released
    packages:
      - http
      - io
      - sql
      - sql-sqlserver
      - sql-postgresql
      - sql-mysql
      - polly

  - version: "2.0.0"
    release_date: "2027-01-15"
    status: in_development
    packages:
      - pipeline
      - csv

# ============================================================================
# BADGES AND LINKS
# ============================================================================

badges:
  nuget_url: "https://www.nuget.org/packages/{nuget_id}"
  nuget_badge: "https://img.shields.io/nuget/v/{nuget_id}.svg?style=flat-square"
  nuget_downloads: "https://img.shields.io/nuget/dt/{nuget_id}.svg?style=flat-square"

links:
  documentation: "https://rivulet2.readthedocs.io"
  repository: "https://github.com/Jeffeek/Rivulet"
  issues: "https://github.com/Jeffeek/Rivulet/issues"
  discussions: "https://github.com/Jeffeek/Rivulet/discussions"
